name: CI build

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test and Lint
    runs-on: ${{ matrix.os }}
    env:
      PYTHONIOENCODING: "utf8"
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        python-version: [ "3.11" ]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        name: Checkout ComfyUI
        with:
          repository: comfyanonymous/ComfyUI
          ref: v0.3.57
          path: comfyui
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
          pip install -r comfyui/requirements.txt
      - name: Run Tests
        run: |
          pytest tests/
        env:
          PYTHONPATH: ./comfyui
      - name: Run Linting
        run: |
          ruff check .
